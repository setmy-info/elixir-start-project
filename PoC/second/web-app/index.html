<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator App</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <main>
      <h1>Calculator App</h1>
      <p>Static files are served by the same Plug/Cowboy server as the REST and GraphQL APIs.</p>
      <p>Enter two whole numbers and choose whether to call <code>/api/add</code> or <code>/api/graphql</code>.</p>
      <p>You can also open the GraphQL request UI at <a href="/graphiql">/graphiql</a> and the REST Swagger UI at <a href="/swagger">/swagger</a>.</p>

      <form id="add-form">
        <label for="transport">API style</label>
        <select id="transport" name="transport">
          <option value="rest">REST</option>
          <option value="graphql">GraphQL</option>
        </select>

        <label for="number-a">First number</label>
        <input id="number-a" name="a" type="number" step="1" required />

        <label for="number-b">Second number</label>
        <input id="number-b" name="b" type="number" step="1" required />

        <button type="submit">Add numbers</button>
      </form>

      <p id="result" aria-live="polite"></p>
      <p id="error" aria-live="polite"></p>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
