# Calculator application configuration — mirrors config.yml

[app]
name    = "calculator-app"
version = "2.0.0"
debug   = false

[server]
port            = 4000
max_connections = 1000
allowed_origins = [
  "http://localhost:3000",
  "https://app.example.com"
]

[cache]
max_entries = 500
ttl_seconds = 300

[logging]
level     = "info"
file      = "log/calculator_app.log"
max_bytes = 10485760

[feature_flags]
swagger_ui       = true
graphiql         = true
mutation_testing = false
