# Application configuration — mirrors config.yml

[app]
name    = "elixir-start-project"
version = "0.1.0"
debug   = false

[database]
host      = "localhost"
port      = 5432
pool_size = 10
timeout   = 5000

[server]
port            = 4000
max_connections = 1000
allowed_origins = [
  "http://localhost:3000",
  "https://app.example.com"
]

[feature_flags]
hot_reload          = true
graphql_playground  = true
wasm_engine         = false
